<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strata Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #fff; color: #1a1a1b; }
    @media (prefers-color-scheme: dark) { body { background: #1a1a1b; color: #d7dadc; } }
    h2 { font-size: 18px; margin-bottom: 12px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat { background: #f6f7f8; border-radius: 8px; padding: 12px; text-align: center; }
    @media (prefers-color-scheme: dark) { .stat { background: #272729; } }
    .stat-value { font-size: 24px; font-weight: bold; color: #0079d3; }
    .stat-label { font-size: 11px; color: #7c7c7c; margin-top: 4px; }
    .updated { font-size: 11px; color: #7c7c7c; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <h2>Strata Embedding Atlas</h2>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="embeddings">-</div>
      <div class="stat-label">Embeddings</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="inspections">-</div>
      <div class="stat-label">Inspections</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="auto">-</div>
      <div class="stat-label">Auto-Embedded</div>
    </div>
  </div>
  <div class="updated" id="updated"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
